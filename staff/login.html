<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>員工登入 · 一坨咖啡</title>
  <link rel="icon" href="../favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --taupe: #c7bdae;
      --taupe-soft: #d6cdbf;
      --ink: #4a3a2c;
      --ink-soft: #7c6f5e;
      --field: rgba(255,255,255,.5);
      --field-line: rgba(255,255,255,.6);
      --brown: #443629;
    }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(170deg, #cdc4b6 0%, #c2b8a8 100%);
      color: var(--ink); -webkit-font-smoothing: antialiased;
    }
    .auth {
      max-width: 380px; margin: 0 auto; min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: center;
      padding: 36px 30px;
    }
    .logo { width: 168px; max-width: 60%; display: block; margin: 0 auto 30px; }
    h1 { font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 25px; text-align: center; margin: 0 0 6px; color: var(--ink); }
    .sub { text-align: center; font-size: 13px; color: var(--ink-soft); margin: 0 0 30px; }
    .field-wrap { position: relative; margin-bottom: 14px; }
    .field-wrap .ic { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); display: flex; }
    .auth-input {
      width: 100%; padding: 15px 16px 15px 46px; font-size: 15px; font-family: inherit;
      color: var(--ink); background: var(--field); border: 1px solid var(--field-line);
      border-radius: 15px; outline: none; transition: background .15s, border-color .15s;
    }
    .auth-input::placeholder { color: #8d8170; }
    .auth-input:focus { background: rgba(255,255,255,.68); border-color: rgba(255,255,255,.9); }
    .eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--ink-soft); padding: 6px; display: flex; }
    .btn-login {
      width: 100%; padding: 15px; margin-top: 8px; font-size: 15px; font-family: inherit;
      background: var(--brown); color: #f3ece1; border: none; border-radius: 15px; cursor: pointer;
      transition: opacity .15s, transform .05s;
    }
    .btn-login:hover:not(:disabled) { background: #3a2d21; }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .err { color: #a8412c; font-size: 13px; text-align: center; min-height: 18px; margin-top: 10px; }
    .hint { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 18px; }
    .cup { text-align: center; margin-top: 26px; color: rgba(74,58,44,.4); }
  </style>
</head>
<body>
  <form class="auth" id="form" autocomplete="on">
    <img class="logo" src="../logo.png" alt="一坨咖啡" />
    <h1>Welcome back</h1>
    <p class="sub">登入你的一坨咖啡工作空間</p>

    <div class="field-wrap">
      <span class="ic">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>
      </span>
      <input class="auth-input" type="email" id="email" placeholder="Email address" autocomplete="username" required />
    </div>

    <div class="field-wrap">
      <span class="ic">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input class="auth-input" type="password" id="password" placeholder="Password" autocomplete="current-password" required />
      <button class="eye" type="button" id="eye" aria-label="顯示密碼">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button class="btn-login" type="submit" id="submit">Log In</button>
    <div class="err" id="err"></div>
    <p class="hint">忘記密碼或無法登入，請聯絡店長。</p>

    <div class="cup">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
    </div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="staff.js"></script>
  <script>
    const { sb } = JB;
    const errEl = document.getElementById('err');

    if (new URLSearchParams(location.search).get('denied')) {
      errEl.textContent = '此帳號沒有員工權限，請聯絡店長。';
    }

    // 密碼顯示切換
    document.getElementById('eye').addEventListener('click', () => {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    });

    // 已登入就依角色導向
    (async () => {
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return;
      const { data: staff } = await sb.from('staff').select('role,is_active').eq('id', user.id).maybeSingle();
      if (staff && staff.is_active !== false) {
        location.replace(staff.role === 'owner' ? 'manage.html' : 'me.html');
      } else {
        await sb.auth.signOut();
      }
    })();

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      const btn = document.getElementById('submit');
      btn.disabled = true; btn.textContent = '登入中…';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = '登入失敗：帳號或密碼錯誤';
        btn.disabled = false; btn.textContent = 'Log In';
        return;
      }
      const { data: staff } = await sb.from('staff').select('role,is_active').eq('id', data.user.id).maybeSingle();
      if (!staff || staff.is_active === false) {
        await sb.auth.signOut();
        errEl.textContent = '此帳號沒有員工權限，請聯絡店長。';
        btn.disabled = false; btn.textContent = 'Log In';
        return;
      }
      location.replace(staff.role === 'owner' ? 'manage.html' : 'me.html');
    });
  </script>
</body>
</html>
