<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>店內菜單 ｜ 一坨咖啡與生活選物</title>
<meta name="description" content="一坨咖啡店內菜單：手沖咖啡、義式咖啡、非咖啡類飲品。">
<meta property="og:title" content="店內菜單 ｜ 一坨">
<meta property="og:description" content="店內現點現做，菜單會隨季節微調。">
<meta property="og:image" content="logo.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Noto+Serif+TC:wght@300;400;500;600&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdfdfb;
    --bg-soft: #f6f2ea;
    --bg-card: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #6b665e;
    --ink-faint: #a8a299;
    --line: #e8e3d8;
    --accent: #8b6f47;
    --accent-deep: #5c4830;
    --f-serif-tc: 'Noto Serif TC', serif;
    --f-serif-en: 'Cormorant Garamond', serif;
    --f-serif-jp: 'Shippori Mincho', 'Noto Serif TC', serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--f-serif-tc);
    font-weight: 300;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 22px 48px;
    background: rgba(253, 253, 251, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .back {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .back:hover { color: var(--ink); }
  .logo .mark {
    font-family: var(--f-serif-tc);
    font-size: 18px;
    letter-spacing: 0.18em;
    font-weight: 500;
  }
  .logo .sub {
    display: block;
    font-family: var(--f-serif-en);
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    text-align: center;
    margin-top: 1px;
  }
  .nav-spacer { width: 70px; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 90px 48px 120px;
  }

  .menu-head {
    text-align: center;
    margin-bottom: 80px;
  }
  .eyebrow {
    font-family: var(--f-serif-en);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  h1 {
    font-family: var(--f-serif-tc);
    font-size: clamp(36px, 5vw, 52px);
    font-weight: 400;
    letter-spacing: 0.12em;
    margin: 14px 0 22px;
  }
  .divider {
    width: 56px;
    height: 1px;
    background: var(--ink-faint);
    margin: 0 auto 28px;
  }
  .head-sub {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.9;
  }

  /* === Menu sections === */
  .menu-section { margin: 0 0 80px; }
  .menu-section:last-child { margin-bottom: 0; }
  .sec-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 36px;
  }
  .sec-head .zh {
    font-family: var(--f-serif-tc);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.18em;
  }
  .sec-head .bar { color: var(--ink-faint); font-weight: 300; }
  .sec-head .en {
    font-family: var(--f-serif-en);
    font-size: 16px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .items-grid {
    display: grid;
    column-gap: 56px;
    row-gap: 22px;
  }
  .items-grid.cols-1 { grid-template-columns: 1fr; max-width: 720px; }
  .items-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .items-grid.cols-4 { grid-template-columns: 1fr; column-gap: 24px; }

  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 18px;
    align-items: baseline;
  }
  .items-grid.cols-4 .item {
    grid-template-columns: 1.4fr 1.6fr 1fr auto;
  }
  .item .name {
    font-family: var(--f-serif-tc);
    font-size: 15px;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .item .en {
    font-family: var(--f-serif-en);
    font-style: italic;
    font-size: 12.5px;
    color: var(--ink-soft);
    margin-top: 2px;
    display: block;
    letter-spacing: 0.02em;
  }
  .item .flavor,
  .item .process {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
  }
  .item .price {
    font-family: var(--f-serif-en);
    font-size: 14px;
    color: var(--accent-deep);
    white-space: nowrap;
  }
  .item .note {
    display: inline-block;
    margin-left: 8px;
    font-size: 11px;
    color: var(--ink-faint);
  }
  .sec-footer-note {
    margin-top: 30px;
    text-align: right;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    line-height: 1.9;
    white-space: pre-line;
  }

  .menu-loading,
  .menu-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
    font-style: italic;
    font-size: 14px;
  }

  .foot-note {
    text-align: center;
    margin-top: 70px;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 2;
  }
  .foot-note a {
    color: var(--accent-deep);
    border-bottom: 1px solid var(--accent);
  }

  @media (max-width: 720px) {
    header { padding: 16px 20px; }
    main { padding: 60px 20px 90px; }
    .menu-head { margin-bottom: 50px; }
    .menu-section { margin-bottom: 56px; }
    .sec-head { flex-wrap: wrap; gap: 8px; }
    .sec-head .zh { font-size: 19px; }
    .sec-head .en { font-size: 13px; letter-spacing: 0.24em; }
    .items-grid { column-gap: 0; row-gap: 16px; }
    .items-grid.cols-2 { grid-template-columns: 1fr; }
    .items-grid.cols-4 .item {
      grid-template-columns: 1fr auto;
      row-gap: 4px;
    }
    .items-grid.cols-4 .item .flavor,
    .items-grid.cols-4 .item .process {
      grid-column: 1 / -1;
    }
  }
</style>
</head>
<body>

<header>
  <a href="/" class="back">← 回首頁</a>
  <a href="/" class="logo">
    <div class="mark">一坨</div>
    <span class="sub">Jibu Cafe</span>
  </a>
  <div class="nav-spacer"></div>
</header>

<main>
  <div class="menu-head">
    <div class="eyebrow">In-Store Menu</div>
    <h1>店內菜單</h1>
    <div class="divider"></div>
    <p class="head-sub">店內現點現做，菜單會隨季節微調。<br>最新品項以店內公告為準。</p>
  </div>

  <div id="menu-root" class="menu-loading">載入菜單中…</div>

  <p class="foot-note">
    最新菜單與當日品項，<br>
    請追蹤 Instagram <a href="https://instagram.com/jibucoffee" target="_blank" rel="noopener">@jibucoffee</a>。
  </p>
</main>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  (async function() {
    const root = document.getElementById('menu-root');
    try {
      const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.JIBU_CONFIG;
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data: cats, error: e1 } = await sb
        .from('menu_categories')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });
      if (e1) throw e1;

      const { data: items, error: e2 } = await sb
        .from('menu_items')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true });
      if (e2) throw e2;

      if (!cats || cats.length === 0) {
        root.className = 'menu-empty';
        root.textContent = '菜單尚未建立。';
        return;
      }

      const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

      const html = cats.map(cat => {
        const its = items.filter(i => i.category_id === cat.id);
        if (its.length === 0) return '';
        const cols = cat.layout === 'two_col' ? 'cols-2' : cat.layout === 'four_col' ? 'cols-4' : 'cols-1';

        const renderItem = (it) => {
          if (cat.layout === 'four_col') {
            return `
              <div class="item">
                <span class="name">${esc(it.name_zh)}</span>
                <span class="flavor">${esc(it.flavor || '')}</span>
                <span class="process">${esc(it.process_method || '')}</span>
                <span class="price">${esc(it.price || '')}</span>
              </div>`;
          }
          return `
            <div class="item">
              <span>
                <span class="name">${esc(it.name_zh)}</span>${it.note ? `<span class="note">${esc(it.note)}</span>` : ''}
                ${it.name_en ? `<span class="en">${esc(it.name_en)}</span>` : ''}
              </span>
              <span class="price">${esc(it.price || '')}</span>
            </div>`;
        };

        return `
          <section class="menu-section">
            <div class="sec-head">
              <span class="zh">${esc(cat.name_zh)}</span>
              <span class="bar">｜</span>
              <span class="en">${esc(cat.name_en)}</span>
            </div>
            <div class="items-grid ${cols}">
              ${its.map(renderItem).join('')}
            </div>
            ${cat.footer_note ? `<div class="sec-footer-note">${esc(cat.footer_note)}</div>` : ''}
          </section>`;
      }).join('');

      root.className = '';
      root.innerHTML = html || '<div class="menu-empty">菜單尚未建立。</div>';
    } catch (err) {
      root.className = 'menu-empty';
      root.textContent = '載入失敗：' + (err.message || err);
      console.error(err);
    }
  })();
</script>

</body>
</html>
